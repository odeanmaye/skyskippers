<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkySkipper</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#050318; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
    canvas { display:block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';

const W = 900, H = 600;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

// ── roundRect polyfill ──
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(r, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r); this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);     this.arcTo(x,y,x+w,y,r);
    this.closePath();
  };
}

// ── INPUT ──
const Input = {
  _held:{}, _just:{},
  init() {
    document.addEventListener('keydown', e => {
      if(!this._held[e.code]) this._just[e.code]=true;
      this._held[e.code]=true;
      if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
    });
    document.addEventListener('keyup', e => { this._held[e.code]=false; });
  },
  held(c){ return !!this._held[c]; },
  just(c){ return !!this._just[c]; },
  clear(){ this._just={}; },
  left(){  return this.held('ArrowLeft')  || this.held('KeyA'); },
  right(){ return this.held('ArrowRight') || this.held('KeyD'); },
  jump(){  return this.held('ArrowUp')    || this.held('KeyW') || this.held('Space'); },
  jumpJust(){ return this.just('ArrowUp') || this.just('KeyW') || this.just('Space'); },
  anyJust(){ return this.jumpJust() || this.just('Enter'); },
};
Input.init();

// ── MATH ──
const lerp = (a,b,t) => a+(b-a)*t;
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const rand = (a,b) => Math.random()*(b-a)+a;
const ri = (a,b) => Math.floor(rand(a,b));
const rc = arr => arr[ri(0,arr.length)];

// ── AUDIO ──
let _actx = null;
function getACtx(){ if(!_actx) _actx = new (window.AudioContext||window.webkitAudioContext)(); return _actx; }
function tone(freq, dur, type='square', vol=0.1, freqEnd=null){
  try {
    const a=getACtx(), osc=a.createOscillator(), g=a.createGain();
    osc.connect(g); g.connect(a.destination);
    osc.type=type; osc.frequency.value=freq;
    if(freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, a.currentTime+dur);
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+dur);
    osc.start(a.currentTime); osc.stop(a.currentTime+dur);
  } catch(e){}
}
const SFX = {
  jump()      { tone(280,0.12,'square',0.08); setTimeout(()=>tone(420,0.1,'square',0.06),60); },
  dblJump()   { tone(500,0.08,'sine',0.1); setTimeout(()=>tone(700,0.1,'sine',0.08),60); },
  land()      { tone(120,0.08,'square',0.1); },
  die()       { tone(300,0.1,'square',0.12); setTimeout(()=>tone(200,0.1,'square',0.1),100); setTimeout(()=>tone(100,0.2,'square',0.08),200); },
  checkpoint(){ tone(600,0.08,'sine',0.12); setTimeout(()=>tone(800,0.08,'sine',0.1),100); setTimeout(()=>tone(1000,0.15,'sine',0.08),200); },
  bounce()    { tone(700,0.1,'sine',0.12,400); },
  boost()     { tone(300,0.15,'sawtooth',0.08,900); },
  complete()  { [300,400,500,700,900].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.12),i*120)); },
};

// ── PARTICLES ──
const particles = [];
function addP(x,y,vx,vy,r,color,life){ particles.push({x,y,vx,vy,r,color,life,ml:life}); }
function spawnLand(x,y){
  for(let i=0;i<6;i++) addP(x+rand(-8,8),y,rand(-1.5,1.5),rand(-3,-0.5),rand(2,4),'#aabbcc',ri(12,22));
}
function spawnDeath(x,y){
  const cls=['#ff4444','#ff8844','#ffcc44','#ff6644'];
  for(let i=0;i<28;i++){
    const a=rand(0,Math.PI*2), s=rand(3,10);
    addP(x,y,Math.cos(a)*s,Math.sin(a)*s-2,rand(3,7),rc(cls),ri(30,55));
  }
}
function spawnCP(x,y){
  const cls=['#ffdd00','#ffaa00','#ffffff'];
  for(let i=0;i<20;i++){
    const a=rand(0,Math.PI*2), s=rand(1,7);
    addP(x,y,Math.cos(a)*s,Math.sin(a)*s-3,rand(3,6),rc(cls),ri(30,60));
  }
}
function spawnBounce(x,y){
  for(let i=0;i<10;i++) addP(x+rand(-12,12),y,rand(-3,3),rand(-6,-1),rand(3,6),'#44ff88',ri(18,32));
}
function spawnBoost(x,y,vx,vy){
  for(let i=0;i<8;i++) addP(x,y,vx*0.3+rand(-2,2),vy*0.3+rand(-2,2),rand(3,5),'#ffcc00',ri(15,25));
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.vx*=0.92; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(cx,cy){
  for(const p of particles){
    ctx.globalAlpha=p.life/p.ml;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x-cx,p.y-cy,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── BLOCK ──
class Block {
  constructor(cfg){
    this.x=cfg.x; this.y=cfg.y;
    this.w=cfg.w||80; this.h=cfg.h||20;
    this.type=cfg.type||'normal';
    this._ox=cfg.x; this._oy=cfg.y;
    // Moving
    this.mAxis=cfg.mAxis||'x'; this.mRange=cfg.mRange||80; this.mSpeed=cfg.mSpeed||1.5;
    this._mt=cfg.mPhase||0; this.dx=0; this.dy=0;
    // Crumble
    this._ct=0; this._cFall=false; this._cVY=0; this._cActive=false; this._cShake=0;
    this.dead=false;
    // Disappear
    this._dCycle=cfg.dCycle||120; this._dT=cfg.dPhase||0; this.solid=true;
    // Boost
    const bd=cfg.boostDir||{x:0,y:-1};
    const bm=Math.hypot(bd.x,bd.y)||1;
    this.boostDir={x:bd.x/bm, y:bd.y/bm};
    this.boostPow=cfg.boostPow||15;
    // Anim
    this._at=0;
  }
  get left(){ return this.x; } get right(){ return this.x+this.w; }
  get top(){ return this.y; }  get bottom(){ return this.y+this.h; }

  update(){
    this._at++; this.dx=0; this.dy=0;
    if(this.type==='moving'){
      this._mt+=this.mSpeed*0.022;
      const off=Math.sin(this._mt)*this.mRange;
      if(this.mAxis==='x'){ const nx=this._ox+off; this.dx=nx-this.x; this.x=nx; }
      else                 { const ny=this._oy+off; this.dy=ny-this.y; this.y=ny; }
    }
    if(this.type==='crumble'){
      if(this._cActive&&!this._cFall){
        this._ct++;
        this._cShake=this._ct>15?Math.sin(this._ct*0.9)*3:0;
        if(this._ct>45){ this._cFall=true; }
      }
      if(this._cFall){ this._cVY+=0.9; this.y+=this._cVY; if(this.y>2200) this.dead=true; }
      this._cActive=false;
    }
    if(this.type==='disappear'){
      this._dT=(this._dT+1)%this._dCycle;
      this.solid=this._dT<this._dCycle*0.72;
    }
  }

  draw(cx,cy){
    if(this.dead) return;
    const sx=this.x-cx+( this.type==='crumble'?this._cShake:0 );
    const sy=this.y-cy;
    const {w,h}=this;
    if(sx+w<-50||sx>W+50||sy+h<-80||sy>H+80) return;

    if(this.type==='disappear'){
      const fade=this._dCycle*0.18;
      const solidEnd=this._dCycle*0.72;
      if(!this.solid){
        ctx.globalAlpha=0.22;
        this._draw(sx,sy,w,h);
        ctx.globalAlpha=1; return;
      }
      if(this._dT>solidEnd-fade){
        ctx.globalAlpha=Math.max(0.1,1-(this._dT-(solidEnd-fade))/fade);
      }
    }
    this._draw(sx,sy,w,h);
    ctx.globalAlpha=1;
  }

  _draw(sx,sy,w,h){
    switch(this.type){
      case 'normal':    this._dNormal(sx,sy,w,h);   break;
      case 'moving':    this._dMoving(sx,sy,w,h);   break;
      case 'bouncy':    this._dBouncy(sx,sy,w,h);   break;
      case 'crumble':   this._dCrumble(sx,sy,w,h);  break;
      case 'ice':       this._dIce(sx,sy,w,h);      break;
      case 'spike':     this._dSpike(sx,sy,w,h);    break;
      case 'disappear': this._dDisappear(sx,sy,w,h);break;
      case 'cloud':     this._dCloud(sx,sy,w,h);    break;
      case 'boost':     this._dBoost(sx,sy,w,h);    break;
    }
  }

  _dNormal(sx,sy,w,h){
    ctx.fillStyle='#556677'; ctx.fillRect(sx,sy,w,h);
    ctx.fillStyle='#7a9ab0'; ctx.fillRect(sx,sy,w,4);
    ctx.fillStyle='#445566';
    for(let row=0;row*10<h;row++){
      const off=(row%2)*Math.round(w/3);
      const bw=Math.round(w/2);
      for(let bx=-off;bx<w;bx+=bw){ ctx.fillRect(sx+bx+0.5,sy+row*10+0.5,bw-1,9); }
    }
    ctx.strokeStyle='#334455'; ctx.lineWidth=1;
    for(let row=0;row*10<h;row++) ctx.strokeRect(sx,sy+row*10,w,10);
  }

  _dMoving(sx,sy,w,h){
    const g=ctx.createLinearGradient(sx,sy,sx,sy+h);
    g.addColorStop(0,'#44aaff'); g.addColorStop(1,'#1a3388');
    ctx.fillStyle=g; ctx.fillRect(sx,sy,w,h);
    ctx.fillStyle='#99ddff'; ctx.fillRect(sx,sy,w,3);
    // animated flow lines
    ctx.strokeStyle='#ffffff33'; ctx.lineWidth=2;
    const t=(this._at%50)/50;
    for(let i=0;i<4;i++){
      const tx=sx+((t+i/4)%1)*w;
      ctx.beginPath(); ctx.moveTo(tx,sy+2); ctx.lineTo(tx-10,sy+h-2); ctx.stroke();
    }
    ctx.strokeStyle='#4488ff'; ctx.lineWidth=1.5;
    ctx.strokeRect(sx,sy,w,h);
  }

  _dBouncy(sx,sy,w,h){
    const sq=Math.sin(this._at*0.12)*1.5;
    const g=ctx.createLinearGradient(sx,sy,sx,sy+h);
    g.addColorStop(0,'#33ee66'); g.addColorStop(1,'#118833');
    ctx.fillStyle=g; ctx.fillRect(sx,sy+sq,w,h-sq);
    ctx.fillStyle='#88ffaa'; ctx.fillRect(sx,sy+sq,w,4);
    // spring zigzag
    ctx.strokeStyle='#00aa44'; ctx.lineWidth=2; ctx.lineJoin='round';
    ctx.beginPath();
    const steps=7;
    for(let i=0;i<=steps;i++){
      const px=sx+(i/steps)*w;
      const py=sy+h-2-(i%2===0?0:8)+sq;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.stroke();
    // up arrow
    ctx.fillStyle='#ffffff99';
    ctx.beginPath();
    ctx.moveTo(sx+w/2,sy+4+sq);
    ctx.lineTo(sx+w/2-7,sy+13+sq);
    ctx.lineTo(sx+w/2+7,sy+13+sq);
    ctx.fill();
  }

  _dCrumble(sx,sy,w,h){
    const dmg=Math.min(this._ct/45,1);
    const r=Math.round(180+dmg*75), gr=Math.round(90-dmg*40);
    ctx.fillStyle=`rgb(${r},${gr},30)`; ctx.fillRect(sx,sy,w,h);
    ctx.fillStyle='#cc8844'; ctx.fillRect(sx,sy,w,3);
    if(dmg>0.15){
      ctx.strokeStyle='#00000077'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(sx+w*.3,sy); ctx.lineTo(sx+w*.2,sy+h*.5); ctx.lineTo(sx+w*.4,sy+h); ctx.stroke();
    }
    if(dmg>0.45){
      ctx.beginPath(); ctx.moveTo(sx+w*.7,sy); ctx.lineTo(sx+w*.8,sy+h*.4); ctx.lineTo(sx+w*.6,sy+h); ctx.stroke();
    }
    // warning icon
    ctx.fillStyle='#ffff0066';
    ctx.font=`${Math.round(h*0.55)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillText('!',sx+w/2,sy+h*.8);
  }

  _dIce(sx,sy,w,h){
    const g=ctx.createLinearGradient(sx,sy,sx,sy+h);
    g.addColorStop(0,'#c0e8ff'); g.addColorStop(1,'#6699cc');
    ctx.fillStyle=g; ctx.fillRect(sx,sy,w,h);
    ctx.fillStyle='#ffffffaa'; ctx.fillRect(sx,sy,w,3);
    // crystals
    ctx.strokeStyle='#ffffff88'; ctx.lineWidth=1;
    for(let i=0;i<Math.max(2,Math.floor(w/30));i++){
      const ix=sx+w*(i+0.5)/Math.max(2,Math.floor(w/30));
      const iy=sy+h/2; const s=5;
      ctx.beginPath();
      ctx.moveTo(ix,iy-s); ctx.lineTo(ix,iy+s);
      ctx.moveTo(ix-s,iy); ctx.lineTo(ix+s,iy);
      ctx.moveTo(ix-s*.7,iy-s*.7); ctx.lineTo(ix+s*.7,iy+s*.7);
      ctx.moveTo(ix+s*.7,iy-s*.7); ctx.lineTo(ix-s*.7,iy+s*.7);
      ctx.stroke();
    }
    ctx.strokeStyle='#aaddff88'; ctx.lineWidth=1; ctx.strokeRect(sx,sy,w,h);
  }

  _dSpike(sx,sy,w,h){
    ctx.fillStyle='#221122'; ctx.fillRect(sx,sy+Math.round(h*.4),w,Math.round(h*.6));
    const n=Math.max(2,Math.floor(w/11));
    ctx.fillStyle='#cc1133';
    for(let i=0;i<n;i++){
      const spx=sx+(i+0.5)*(w/n);
      ctx.beginPath();
      ctx.moveTo(spx,sy); ctx.lineTo(spx-5,sy+h*.45); ctx.lineTo(spx+5,sy+h*.45);
      ctx.fill();
    }
    // glow
    ctx.strokeStyle='#ff224466'; ctx.lineWidth=1; ctx.strokeRect(sx,sy,w,h);
  }

  _dDisappear(sx,sy,w,h){
    const pulse=Math.sin(this._dT*0.18)*0.25+0.75;
    const g=ctx.createLinearGradient(sx,sy,sx,sy+h);
    g.addColorStop(0,`rgba(180,80,255,${pulse})`); g.addColorStop(1,`rgba(100,30,180,${pulse})`);
    ctx.fillStyle=g; ctx.fillRect(sx,sy,w,h);
    ctx.fillStyle=`rgba(220,160,255,${pulse})`; ctx.fillRect(sx,sy,w,3);
    // sparkles
    ctx.fillStyle='#ffffffaa';
    for(let i=0;i<3;i++){
      const px=sx+w*(i+0.5)/3, py=sy+h/2;
      const r=3*pulse;
      ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
    }
    ctx.strokeStyle=`rgba(200,100,255,${pulse*0.6})`; ctx.lineWidth=1; ctx.strokeRect(sx,sy,w,h);
  }

  _dCloud(sx,sy,w,h){
    ctx.fillStyle='rgba(255,255,255,0.88)';
    ctx.fillRect(sx,sy+Math.round(h/2),w,Math.round(h/2));
    const n=Math.max(2,Math.floor(w/32));
    for(let i=0;i<n;i++){
      const px=sx+w*(i+0.5)/n;
      const r=14+(i%2)*5;
      ctx.beginPath(); ctx.arc(px,sy+Math.round(h/2),r,0,Math.PI*2); ctx.fill();
    }
    // soft shadow
    ctx.fillStyle='rgba(170,200,230,0.4)'; ctx.fillRect(sx,sy+h-4,w,4);
    // label
    ctx.fillStyle='rgba(100,140,180,0.7)'; ctx.font='9px sans-serif'; ctx.textAlign='center';
    ctx.fillText('ONE-WAY',sx+w/2,sy+h+10);
  }

  _dBoost(sx,sy,w,h){
    const g=ctx.createLinearGradient(sx,sy,sx,sy+h);
    g.addColorStop(0,'#ffcc00'); g.addColorStop(1,'#cc7700');
    ctx.fillStyle=g; ctx.fillRect(sx,sy,w,h);
    ctx.fillStyle='#ffe566'; ctx.fillRect(sx,sy,w,3);
    // arrow
    const bd=this.boostDir, cx2=sx+w/2, cy2=sy+h/2, aL=Math.min(w,h)*0.36;
    ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(cx2-bd.x*aL,cy2-bd.y*aL);
    ctx.lineTo(cx2+bd.x*aL,cy2+bd.y*aL);
    ctx.stroke();
    const ang=Math.atan2(bd.y,bd.x);
    ctx.fillStyle='#fff'; ctx.beginPath();
    ctx.moveTo(cx2+bd.x*aL,cy2+bd.y*aL);
    ctx.lineTo(cx2+Math.cos(ang+2.5)*aL*.5,cy2+Math.sin(ang+2.5)*aL*.5);
    ctx.lineTo(cx2+Math.cos(ang-2.5)*aL*.5,cy2+Math.sin(ang-2.5)*aL*.5);
    ctx.closePath(); ctx.fill();
    ctx.lineCap='butt';
    // pulse ring
    const pulse=(this._at%30)/30;
    ctx.strokeStyle=`rgba(255,220,0,${1-pulse})`; ctx.lineWidth=1.5;
    ctx.strokeRect(sx-pulse*6,sy-pulse*6,w+pulse*12,h+pulse*12);
  }
}

// ── CHECKPOINT ──
class Checkpoint {
  constructor(x,y){ this.x=x; this.y=y; this.w=20; this.h=48; this.active=false; this._t=0; this._pulse=0; }
  activate(){
    if(!this.active){ this.active=true; this._pulse=35; spawnCP(this.x+10,this.y+this.h/2); SFX.checkpoint(); }
  }
  update(){ this._t++; if(this._pulse>0) this._pulse--; }
  draw(cx,cy){
    const sx=this.x-cx, sy=this.y-cy;
    ctx.strokeStyle='#778899'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(sx+10,sy+this.h); ctx.lineTo(sx+10,sy); ctx.stroke();
    // flag
    const wave=Math.sin(this._t*0.1)*4;
    ctx.fillStyle=this.active?'#ffdd00':'#888';
    ctx.beginPath();
    ctx.moveTo(sx+10,sy);
    ctx.lineTo(sx+10+20+wave,sy+8);
    ctx.lineTo(sx+10,sy+18);
    ctx.fill();
    if(this.active){
      ctx.strokeStyle='#ffdd00'; ctx.lineWidth=1;
      ctx.globalAlpha=0.4+Math.sin(this._t*0.12)*0.25;
      ctx.beginPath(); ctx.arc(sx+10,sy+this.h/2,22,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=1;
    }
    if(this._pulse>0){
      ctx.globalAlpha=this._pulse/35;
      ctx.fillStyle='#ffff0033';
      ctx.beginPath(); ctx.arc(sx+10,sy+this.h/2,(35-this._pulse)*2,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
  }
  hits(p){ return p.x<this.x+this.w+12&&p.x+p.w>this.x-12&&p.y<this.y+this.h&&p.y+p.h>this.y; }
}

// ── GOAL ──
class Goal {
  constructor(x,y,locked=false){ this.x=x; this.y=y; this.w=40; this.h=60; this._t=0; this.locked=locked; }
  update(){ this._t++; }
  draw(cx,cy){
    const sx=this.x-cx+this.w/2, sy=this.y-cy+this.h/2;
    const r=26+Math.sin(this._t*0.07)*5;
    const pulse=Math.sin(this._t*0.05)*0.2+0.8;
    if(this.locked){
      // Locked: dim red portal with lock icon
      ctx.strokeStyle=`rgba(180,60,60,${0.5*pulse})`; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle=`rgba(80,20,20,${0.4*pulse})`;
      ctx.beginPath(); ctx.arc(sx,sy,r-7,0,Math.PI*2); ctx.fill();
      ctx.font='26px sans-serif'; ctx.textAlign='center'; ctx.fillStyle='rgba(255,100,100,0.7)';
      ctx.fillText('🔒',sx,sy+10);
      ctx.fillStyle='rgba(255,120,120,0.6)'; ctx.font='bold 10px sans-serif';
      ctx.fillText('DEFEAT THE BOSS',sx,sy+r+16);
      return;
    }
    const g=ctx.createRadialGradient(sx,sy,0,sx,sy,r+18);
    g.addColorStop(0,`rgba(80,255,180,${0.35*pulse})`); g.addColorStop(1,'rgba(80,255,180,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,sy,r+18,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=`rgba(80,255,180,${0.85*pulse})`; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle=`rgba(40,200,140,${0.6*pulse})`;
    ctx.beginPath(); ctx.arc(sx,sy,r-7,0,Math.PI*2); ctx.fill();
    ctx.font='26px sans-serif'; ctx.textAlign='center'; ctx.fillStyle='#fff';
    ctx.fillText('★',sx,sy+10);
    ctx.fillStyle='#afffcc'; ctx.font='bold 11px sans-serif';
    ctx.fillText('GOAL',sx,sy+r+16);
  }
  hits(p){
    if(this.locked) return false;
    const cx=this.x+this.w/2, cy=this.y+this.h/2;
    return Math.hypot(cx-(p.x+p.w/2),cy-(p.y+p.h/2))<36;
  }
}

// ── PROJECTILE ──
class Projectile {
  constructor(x,y,vx,vy){ this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.r=9; this.dead=false; this._t=0; }
  update(){ this._t++; this.x+=this.vx; this.y+=this.vy; if(this._t>280||this.x<-400||this.x>10000) this.dead=true; }
  hits(p){ return Math.hypot(this.x-(p.x+p.w/2),this.y-(p.y+p.h/2))<this.r+10; }
  draw(cx,cy){
    const sx=this.x-cx, sy=this.y-cy;
    const pulse=Math.sin(this._t*0.25)*0.3+0.7;
    ctx.fillStyle=`rgba(255,80,20,${0.25*pulse})`; ctx.beginPath(); ctx.arc(sx,sy,this.r+8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff5511';                        ctx.beginPath(); ctx.arc(sx,sy,this.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffcc88';                        ctx.beginPath(); ctx.arc(sx,sy,this.r*0.45,0,Math.PI*2); ctx.fill();
  }
}

// ── BOSS ──
class Boss {
  constructor(x,y,arenaL,arenaR,maxHp=5){
    this.x=x; this.y=y; this.w=96; this.h=96;
    this._arenaL=arenaL; this._arenaR=arenaR; this._baseY=y;
    this.hp=maxHp; this.maxHp=maxHp; this._phase=1;
    this.vx=1; this._t=0; this._stateT=0;
    // State: patrol | telegraphCharge | charge | telegraphPound | pound | poundLand
    this._state='patrol';
    this._shootT=0; this._chargeT=0; this._poundT=0;
    this._chargeDir=1; this._poundVY=0;
    this.projs=[]; this._hitTexts=[];
    this._inv=0; this._phaseFlash=0; this._lightningT=0;
    this._active=false; this._warnT=190;
    this.dead=false; this.defeated=false; this._defT=0;
  }

  // ── attack helpers ──
  _shoot(player){
    const bcx=this.x+48, bcy=this.y+48;
    const pcx=player.x+player.w/2, pcy=player.y+player.h/2;
    const dist=Math.hypot(pcx-bcx,pcy-bcy)||1;
    const spd=5.8;
    this.projs.push(new Projectile(bcx,bcy,(pcx-bcx)/dist*spd,(pcy-bcy)/dist*spd));
    if(this._phase>=2){
      const ang=Math.atan2(pcy-bcy,pcx-bcx), spread=this._phase===3?0.32:0.48;
      [-spread,spread].forEach(off=>this.projs.push(new Projectile(bcx,bcy,Math.cos(ang+off)*spd,Math.sin(ang+off)*spd)));
    }
    if(this._phase===3){
      const ang=Math.atan2(pcy-bcy,pcx-bcx);
      [-0.85,0.85].forEach(off=>this.projs.push(new Projectile(bcx,bcy,Math.cos(ang+off)*(spd-1),Math.sin(ang+off)*(spd-1))));
    }
    tone(220,0.09,'sawtooth',0.07,120);
  }
  _spawnShockwaves(){
    const wy=this._baseY+this.h-8;
    this.projs.push(new Projectile(this.x,wy,-6.5,0));
    this.projs.push(new Projectile(this.x+this.w,wy,6.5,0));
  }

  // ── main update ──
  update(player,game){
    this._t++; this._lightningT++;
    if(!this._active&&player.x>this._arenaL-380){ this._active=true; }
    if(!this._active) return;
    if(this._warnT>0){ this._warnT--; return; }
    if(this.defeated){
      this._defT++;
      if(this._defT===1){
        const cls=['#ff6600','#ffaa00','#ff2200','#ffff00','#fff','#ff88ff'];
        for(let i=0;i<90;i++){ const a=rand(0,Math.PI*2),s=rand(3,18); addP(this.x+48,this.y+48,Math.cos(a)*s,Math.sin(a)*s-3,rand(4,13),rc(cls),ri(60,110)); }
        game.bossDefeated=true; game.goal.locked=false;
        [250,380,530,700,920,1200].forEach((f,i)=>setTimeout(()=>tone(f,0.28,'sine',0.14),i*90));
      }
      if(this._defT>5) this.dead=true;
      return;
    }

    // Phase transitions
    if(this._phaseFlash>0) this._phaseFlash--;
    const prevPhase=this._phase;
    if(this.hp<=Math.ceil(this.maxHp*0.6)&&this._phase===1){ this._phase=2; this._phaseFlash=90; game._shake=28; tone(150,0.3,'square',0.15); }
    if(this.hp<=1&&this._phase<3){ this._phase=3; this._phaseFlash=90; game._shake=35; tone(100,0.4,'square',0.18); }

    const spd   =[0,1.5,2.8,4.5][this._phase];
    const shootI=[0,120,52,32][this._phase];
    const chargeI=[0,9999,160,90][this._phase]; // phase 1 never charges
    const poundI =[0,9999,360,180][this._phase]; // phase 1 never pounds

    this._stateT++;
    switch(this._state){
      case 'patrol':
        this.x+=this.vx*spd;
        if(this.x<=this._arenaL){ this.x=this._arenaL; this.vx=1; }
        if(this.x+this.w>=this._arenaR){ this.x=this._arenaR-this.w; this.vx=-1; }
        this.y=this._baseY+Math.sin(this._t*0.045)*10;
        this._shootT++; if(this._shootT>=shootI){ this._shootT=0; this._shoot(player); }
        this._chargeT++; if(this._chargeT>=chargeI){ this._chargeT=0; this._chargeDir=player.x>this.x+48?1:-1; this._state='telegraphCharge'; this._stateT=0; }
        this._poundT++;  if(this._poundT>=poundI){  this._poundT=0;  this._state='telegraphPound';  this._stateT=0; }
        break;
      case 'telegraphCharge':
        if(this._stateT>=58){ this._state='charge'; this._stateT=0; game._shake=5; }
        break;
      case 'charge':
        this.y=this._baseY;
        this.x+=this._chargeDir*15;
        if(this.x<=this._arenaL||this.x+this.w>=this._arenaR){
          this.x=clamp(this.x,this._arenaL,this._arenaR-this.w);
          this._state='patrol'; this._stateT=0; tone(180,0.12,'square',0.1);
        }
        // Charge body damage
        if(!player.dead&&player.x<this.x+this.w&&player.x+player.w>this.x&&player.y<this.y+this.h&&player.y+player.h>this.y) player.die(game);
        break;
      case 'telegraphPound':
        if(this._stateT>=68){ this._state='pound'; this._stateT=0; this._poundVY=-18; }
        break;
      case 'pound':
        this._poundVY+=1.0; this.y+=this._poundVY;
        if(this.y>=this._baseY){
          this.y=this._baseY; this._state='poundLand'; this._stateT=0;
          this._spawnShockwaves(); game._shake=24;
          tone(80,0.28,'square',0.18);
          for(let i=0;i<35;i++) addP(this.x+48,this.y+this.h,rand(-10,10),rand(-5,-0.5),rand(4,9),rc(['#ff4400','#ffaa00','#fff']),ri(22,45));
        }
        break;
      case 'poundLand':
        if(this._stateT>=50){ this._state='patrol'; this._stateT=0; }
        break;
    }

    // Projectile updates
    for(let i=this.projs.length-1;i>=0;i--){
      const p=this.projs[i]; p.update();
      if(!player.dead&&p.hits(player)){ player.die(game); p.dead=true; }
      if(p.dead) this.projs.splice(i,1);
    }
    // Stomp detection
    if(this._inv<=0&&!player.dead&&this._state!=='telegraphCharge'){
      const py2=player.y+player.h;
      if(player.vy>0&&py2>=this.y-5&&py2<=this.y+26&&player.x+player.w>this.x+6&&player.x<this.x+this.w-6) this._hit(player,game);
    }
    if(this._inv>0) this._inv--;
    for(let i=this._hitTexts.length-1;i>=0;i--){ const h=this._hitTexts[i]; h.y-=1.4; h.t--; if(h.t<=0) this._hitTexts.splice(i,1); }
    // Phase 3 embers
    if(this._phase===3&&this._t%6===0) addP(this.x+rand(8,88),this.y+rand(10,86),rand(-1,1),rand(-3,-0.5),rand(2,4),'#ff6600',ri(12,22),0.04);
  }

  _hit(player,game){
    this.hp--; this._inv=68;
    player.vy=-14; player.canDbl=true;
    const hpLeft=Math.max(0,this.hp);
    this._hitTexts.push({x:this.x+rand(10,86),y:this.y-18,t:40,n:hpLeft>0?`STOMP! ${hpLeft} HP left`:'LAST HIT!'});
    for(let i=0;i<24;i++) addP(this.x+48,this.y+8,rand(-7,7),rand(-8,-1),rand(3,8),rc(['#ff8800','#ffcc00','#fff','#ff4400']),ri(24,45));
    tone(1100,0.07,'square',0.18,600); game._shake=12;
    if(this.hp<=0) this.defeated=true;
  }

  // ── draw ──
  draw(cx,cy){
    if(this.dead) return;
    const sx=this.x-cx, sy=this.y-cy, {w,h}=this;

    // ── warning banner ──
    if(this._active&&this._warnT>0){
      const a=Math.min(1,this._warnT>130?(this._warnT-130)/60:this._warnT/60);
      ctx.globalAlpha=a;
      ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(W/2-240,H/2-60,480,78);
      ctx.fillStyle='#ff3300'; ctx.font='bold 34px sans-serif'; ctx.textAlign='center';
      ctx.fillText('⚡  SKY TITAN AWAKENS  ⚡',W/2,H/2-18);
      ctx.fillStyle='#ffaa88'; ctx.font='15px sans-serif';
      ctx.fillText('Jump on its crown to deal damage  •  Dodge the attacks!',W/2,H/2+20);
      ctx.globalAlpha=1; return;
    }

    const phaseC=[null,
      {body:'#8833dd',dark:'#441188',glow:'#cc88ff',eye:'#ffff44',crown:'#ffcc00'},
      {body:'#cc4400',dark:'#881100',glow:'#ff9944',eye:'#ffee44',crown:'#ff8800'},
      {body:'#ff1100',dark:'#880000',glow:'#ff5500',eye:'#ffffff',crown:'#ff4400'},
    ];
    const pc=phaseC[this._phase];

    // invincibility flash
    const inv=this._inv>0&&Math.floor(this._inv/4)%2===1;
    if(inv) ctx.globalAlpha=0.22;

    // phase transition white flash
    if(this._phaseFlash>0&&Math.floor(this._phaseFlash/5)%2===0){
      ctx.globalAlpha=0.6; ctx.fillStyle='#fff'; ctx.fillRect(sx-5,sy-5,w+10,h+10); ctx.globalAlpha=inv?0.22:1;
    }

    // floor shadow
    const floorSY=this._baseY+h+4-cy;
    ctx.globalAlpha=0.32; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(sx+48,floorSY,46,9,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=inv?0.22:1;

    // outer glow / aura
    const auraR=62+Math.sin(this._t*0.08)*6;
    const grdA=ctx.createRadialGradient(sx+48,sy+48,0,sx+48,sy+48,auraR+20);
    grdA.addColorStop(0,`${pc.glow}55`); grdA.addColorStop(1,`${pc.glow}00`);
    ctx.fillStyle=grdA; ctx.beginPath(); ctx.arc(sx+48,sy+48,auraR+20,0,Math.PI*2); ctx.fill();

    // ── charge telegraph ──
    if(this._state==='telegraphCharge'){
      const p=Math.sin(this._stateT*0.35)*0.5+0.5;
      ctx.strokeStyle=`rgba(255,220,0,${0.5+p*0.5})`; ctx.lineWidth=7;
      ctx.strokeRect(sx-4,sy-4,w+8,h+8);
      ctx.fillStyle=`rgba(255,200,0,0.12)`; ctx.fillRect(sx-4,sy-4,w+8,h+8);
    }
    // ── pound telegraph ──
    if(this._state==='telegraphPound'){
      const frac=this._stateT/68;
      ctx.globalAlpha=0.45*frac; ctx.fillStyle='#aa00ff';
      ctx.beginPath(); ctx.ellipse(sx+48,floorSY,55*frac,14*frac,0,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=inv?0.22:1;
    }

    // ── body ──
    const gBody=ctx.createLinearGradient(sx,sy,sx,sy+h);
    gBody.addColorStop(0,pc.body); gBody.addColorStop(1,pc.dark);
    ctx.fillStyle=gBody; ctx.fillRect(sx,sy,w,h);
    // rim highlights
    ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.fillRect(sx,sy,11,h);
    ctx.fillStyle='rgba(0,0,0,0.22)';       ctx.fillRect(sx+w-11,sy,11,h);

    // phase 3 cracks
    if(this._phase===3){
      ctx.strokeStyle='rgba(255,120,0,0.65)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(sx+22,sy+8); ctx.lineTo(sx+32,sy+44); ctx.lineTo(sx+18,sy+78); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx+70,sy+18); ctx.lineTo(sx+60,sy+52); ctx.lineTo(sx+74,sy+84); ctx.stroke();
    }

    // ── eyes ──
    const eyeY=sy+Math.round(h*0.26);
    ctx.fillStyle=pc.eye;
    ctx.fillRect(sx+12,eyeY,22,18); ctx.fillRect(sx+w-34,eyeY,22,18);
    ctx.fillStyle='#111';
    ctx.fillRect(sx+16,eyeY+4,13,12); ctx.fillRect(sx+w-28,eyeY+4,13,12);
    ctx.fillStyle='#fff';
    ctx.fillRect(sx+17,eyeY+4,6,6); ctx.fillRect(sx+w-27,eyeY+4,6,6);
    // pupils track player
    const pdx=clamp((player.x+player.w/2-(this.x+48))/220,-1,1);
    const pdy=clamp((player.y+player.h/2-(this.y+48))/170,-1,1);
    ctx.fillStyle='#000';
    ctx.fillRect(sx+19+Math.round(pdx*3.5),eyeY+6+Math.round(pdy*2.5),7,7);
    ctx.fillRect(sx+w-25+Math.round(pdx*3.5),eyeY+6+Math.round(pdy*2.5),7,7);
    // brows
    ctx.strokeStyle='#111'; ctx.lineWidth=3.5; ctx.lineCap='round';
    if(this._phase===3){
      ctx.beginPath(); ctx.moveTo(sx+9,eyeY+6); ctx.lineTo(sx+36,eyeY-5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx+w-9,eyeY+6); ctx.lineTo(sx+w-36,eyeY-5); ctx.stroke();
    } else if(this._phase===2){
      ctx.beginPath(); ctx.moveTo(sx+9,eyeY+3); ctx.lineTo(sx+36,eyeY-2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx+w-9,eyeY+3); ctx.lineTo(sx+w-36,eyeY-2); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(sx+9,eyeY-2); ctx.lineTo(sx+36,eyeY+4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx+w-9,eyeY-2); ctx.lineTo(sx+w-36,eyeY+4); ctx.stroke();
    }
    ctx.lineCap='butt';
    // mouth
    ctx.strokeStyle='#ffcc44'; ctx.lineWidth=3;
    const mY=sy+Math.round(h*0.72);
    ctx.beginPath();
    if(this.hp<=1){ ctx.arc(sx+48,mY,11,0,Math.PI,true); }
    else { ctx.moveTo(sx+14,mY); ctx.lineTo(sx+w-14,mY); }
    ctx.stroke();

    // ── crown ──
    ctx.fillStyle=pc.crown;
    ctx.beginPath();
    ctx.moveTo(sx+5,sy);   ctx.lineTo(sx+5,sy-26);
    ctx.lineTo(sx+24,sy-13); ctx.lineTo(sx+48,sy-34);
    ctx.lineTo(sx+72,sy-13); ctx.lineTo(sx+w-5,sy-26);
    ctx.lineTo(sx+w-5,sy);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=this._phase===1?'#cc9900':'#cc4400'; ctx.lineWidth=2; ctx.stroke();
    // jewels
    ctx.fillStyle='#ff2244'; ctx.beginPath(); ctx.arc(sx+48,sy-31,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=this._phase>=2?'#ff8844':'#44aaff';
    ctx.beginPath(); ctx.arc(sx+16,sy-23,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+w-16,sy-23,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,200,0.7)';
    ctx.beginPath(); ctx.arc(sx+48,sy-31,4,0,Math.PI*2); ctx.fill();

    // ── lightning arcs (phase 2+) ──
    if(this._phase>=2&&this._lightningT%16<9){
      ctx.strokeStyle=`rgba(230,180,255,${0.35+Math.random()*0.45})`; ctx.lineWidth=1.5;
      for(let n=0;n<2;n++){
        const lx=sx+rand(12,84), ly=sy+rand(12,84);
        ctx.beginPath(); ctx.moveTo(lx,ly);
        for(let i=0;i<5;i++) ctx.lineTo(lx+rand(-25,25),ly+rand(-25,25));
        ctx.stroke();
      }
    }

    // ── charge speed lines ──
    if(this._state==='charge'){
      ctx.strokeStyle='rgba(255,200,0,0.55)'; ctx.lineWidth=2;
      for(let i=0;i<7;i++){
        const lx=sx-this._chargeDir*rand(12,70), ly=sy+rand(8,88);
        ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx+this._chargeDir*rand(25,60),ly); ctx.stroke();
      }
    }

    // ── body outline glow ──
    ctx.globalAlpha=0.65+Math.sin(this._t*0.1)*0.2;
    ctx.strokeStyle=pc.glow; ctx.lineWidth=2.5; ctx.strokeRect(sx-1,sy-1,w+2,h+2);
    ctx.globalAlpha=1;

    // ── hit texts ──
    for(const ht of this._hitTexts){
      ctx.globalAlpha=Math.min(1,ht.t/20);
      ctx.fillStyle='#ffdd00'; ctx.strokeStyle='#000'; ctx.lineWidth=3;
      ctx.font='bold 17px sans-serif'; ctx.textAlign='center';
      ctx.strokeText(ht.n,ht.x-cx,ht.y-cy);
      ctx.fillText(ht.n,ht.x-cx,ht.y-cy);
    }
    ctx.globalAlpha=1;

    // ── HP bar (always screen-space) ──
    const bW=210, bH=17, bX=W/2-bW/2, bY=15;
    ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(bX-5,bY-22,bW+10,bH+28);
    const phaseLabel=['','⬛ Phase I','🟧 Phase II','🔴 Phase III'][this._phase];
    ctx.fillStyle=pc.glow; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
    ctx.fillText(`⚡ SKY TITAN  ${phaseLabel}`,bX+bW/2,bY-6);
    ctx.fillStyle='#222'; ctx.fillRect(bX,bY,bW,bH);
    const hpF=Math.max(0,this.hp/this.maxHp);
    const barCol=hpF>0.6?'#44ff44':(hpF>0.3?'#ffaa00':'#ff2222');
    ctx.fillStyle=barCol; ctx.fillRect(bX,bY,bW*hpF,bH);
    // animated bar shimmer
    ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(bX,bY,bW*hpF,Math.round(bH*0.4));
    for(let i=1;i<this.maxHp;i++){
      ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(bX+bW*(i/this.maxHp),bY); ctx.lineTo(bX+bW*(i/this.maxHp),bY+bH); ctx.stroke();
    }
    ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.strokeRect(bX,bY,bW,bH);
    // attack warning label below bar
    const lblMap={patrol:'',telegraphCharge:'⚡ CHARGE INCOMING!',charge:'◀▶ CHARGING!',
                  telegraphPound:'⬇ GROUND POUND!',pound:'💥 SLAMMING!',poundLand:''};
    const lbl=lblMap[this._state]||'';
    if(lbl){
      ctx.fillStyle='#ffdd00'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText(lbl,W/2,bY+bH+18);
    }

    // ── projectiles ──
    for(const p of this.projs) p.draw(cx,cy);
  }
}

// ── PLAYER ──
class Player {
  constructor(x,y){ this._spawn={x,y}; this.reset(x,y); }
  reset(x,y){
    this.x=x; this.y=y; this.vx=0; this.vy=0;
    this.w=22; this.h=34;
    this.onGround=false; this.onIce=false;
    this.canDbl=false; this.wallSlide=false; this.wallDir=0;
    this._coyote=0; this._jBuf=0;
    this._dir=1; this._runT=0; this._at=0;
    this._sq=1; this._trail=[];
    this.dead=false; this._dTimer=0;
  }
  update(blocks,cps,goal,game){
    if(this.dead){ this._dTimer++; if(this._dTimer>85) game.respawn(); return; }
    this._at++;
    const ml=Input.left(), mr=Input.right(), jj=Input.jumpJust();
    if(this._coyote>0) this._coyote--;
    if(this._jBuf>0)   this._jBuf--;
    if(jj) this._jBuf=7;
    // wall slide check (before movement)
    this.wallSlide=false;
    if(!this.onGround&&(ml||mr)){
      const wd=mr?1:-1;
      if(this._wallTouch(blocks,wd)){ this.wallSlide=true; this.wallDir=wd; }
    }
    // horizontal
    const accel=this.onIce?0.4:(this.onGround?1.0:0.65);
    const fric =this.onIce?0.97:(this.onGround?0.75:0.88);
    if(ml){ this.vx-=3.2*accel; this._dir=-1; }
    if(mr){ this.vx+=3.2*accel; this._dir=1; }
    if(!ml&&!mr) this.vx*=fric;
    this.vx=clamp(this.vx,-6.5,6.5);
    // gravity
    if(this.wallSlide&&this.vy>0) this.vy=Math.min(this.vy+0.25,2.8);
    else { this.vy+=0.68; if(!Input.jump()&&this.vy<0) this.vy+=0.35; }
    this.vy=clamp(this.vy,-20,19);
    // jump logic
    if(this._jBuf>0){
      if(this.onGround||this._coyote>0){ this.vy=-9; this._jBuf=0; this._coyote=0; this.canDbl=true; this._sq=0.55; spawnLand(this.x+11,this.y+34); SFX.jump(); }
      else if(this.wallSlide){ this.vy=-10; this.vx=-this.wallDir*7; this._jBuf=0; this._sq=0.6; SFX.jump(); }
      else if(this.canDbl){ this.vy=-9; this._jBuf=0; this.canDbl=false; this._sq=0.6; spawnLand(this.x+11,this.y+17); SFX.dblJump(); }
    }
    // squash/stretch
    this._sq=lerp(this._sq,1,0.14);
    if(this.vy>4) this._sq=lerp(this._sq,1.18,0.08);
    // trail
    if(Math.abs(this.vx)>6||Math.abs(this.vy)>7)
      this._trail.push({x:this.x+11,y:this.y+17,t:7});
    this._trail=this._trail.filter(t=>(t.t--,t.t>0));
    // move & collide
    const px=this.x, py=this.y;
    this.x+=this.vx;
    // X collisions
    this.onIce=false;
    const prevOnG=this.onGround; this.onGround=false;
    for(const b of blocks){
      if(b.dead) continue;
      if(['spike','cloud','disappear'].includes(b.type)&&(b.type==='disappear'?!b.solid:true)&&b.type!=='spike') continue;
      if(b.type==='disappear'&&!b.solid) continue;
      if(b.type==='cloud') continue;
      if(this._ov(b)){
        if(px+this.w<=b.x+1){ this.x=b.x-this.w; this.vx=0; }
        else if(px>=b.x+b.w-1){ this.x=b.x+b.w; this.vx=0; }
      }
    }
    this.y+=this.vy;
    let standB=null;
    for(const b of blocks){
      if(b.dead) continue;
      if(b.type==='spike'){
        if(this._ov(b)){ this.die(game); return; }
        continue;
      }
      if(b.type==='disappear'&&!b.solid) continue;
      if(b.type==='cloud'){
        if(this.vy>=0&&py+this.h<=b.y+5&&this._ovX(b)){
          this.y=b.y-this.h; this.vy=0; this.onGround=true; standB=b;
        }
        continue;
      }
      if(this._ov(b)){
        if(py+this.h<=b.y+2){
          this.y=b.y-this.h; this.vy=0; this.onGround=true; standB=b;
          if(b.type==='bouncy'){ this.vy=-19; this.canDbl=true; spawnBounce(this.x+11,this.y+34); SFX.bounce(); this._sq=0.38; }
          if(b.type==='ice') this.onIce=true;
          if(b.type==='crumble') b._cActive=true;
          if(b.type==='boost'){ this.vx=b.boostDir.x*b.boostPow; this.vy=b.boostDir.y*b.boostPow; this.canDbl=true; spawnBoost(this.x+11,this.y+17,this.vx,this.vy); SFX.boost(); }
        } else if(py>=b.y+b.h-2){
          this.y=b.y+b.h; this.vy=Math.max(this.vy,1);
        }
      }
    }
    // land effect
    if(!prevOnG&&this.onGround){ this._sq=0.52; spawnLand(this.x+11,this.y+34); SFX.land(); }
    // ride platform
    if(standB&&standB.type==='moving'){ this.x+=standB.dx; this.y+=standB.dy; }
    if(prevOnG&&!this.onGround) this._coyote=8;
    if(this.onGround&&(ml||mr)) this._runT++;
    // checkpoints & goal
    for(const cp of cps){ if(cp.hits(this)){ const was=cp.active; cp.activate(); if(!was) game.lastCP={x:cp.x-5,y:cp.y-10}; } }
    if(goal&&goal.hits(this)) game.completeLevel();
    if(this.y>2200) this.die(game);
  }
  die(game){
    if(this.dead) return;
    this.dead=true; this._dTimer=0;
    spawnDeath(this.x+11,this.y+17); SFX.die(); game.deaths++;
  }
  _ov(b){ return this.x<b.x+b.w&&this.x+this.w>b.x&&this.y<b.y+b.h&&this.y+this.h>b.y; }
  _ovX(b){ return this.x+4<b.x+b.w&&this.x+this.w-4>b.x; }
  _wallTouch(blocks,d){
    const tx=d>0?this.x+this.w:this.x-1;
    for(const b of blocks){
      if(b.dead||(b.type==='disappear'&&!b.solid)||b.type==='cloud'||b.type==='spike') continue;
      if(tx>=b.x&&tx<=b.x+b.w&&this.y+this.h-5>b.y&&this.y+5<b.y+b.h) return true;
    }
    return false;
  }
  draw(cx,cy){
    if(this.dead) return;
    const bx=this.x-cx, by=this.y-cy;
    // trail
    for(const t of this._trail){
      ctx.globalAlpha=(t.t/7)*0.28; ctx.fillStyle='#88aaff';
      ctx.fillRect(t.x-cx-6,t.y-cy-9,12,18);
    }
    ctx.globalAlpha=1;
    ctx.save();
    ctx.translate(bx+11,by+17);
    ctx.scale(2-this._sq, this._sq); // squash/stretch
    const d=this._dir;
    // body
    ctx.fillStyle='#3366ff'; ctx.fillRect(-11,-17,22,34);
    // highlight
    ctx.fillStyle='#5588ff'; ctx.fillRect(d>0?-9:-11,-17,6,34);
    // eyes
    ctx.fillStyle='#fff'; ctx.fillRect(d*2,-11,9,8);
    ctx.fillStyle='#111'; ctx.fillRect(d*4,-9,5,5);
    ctx.fillStyle='#44aaff'; ctx.fillRect(d*4,-9,3,3);
    // expression based on vy
    ctx.fillStyle='#ffffffcc';
    if(this.vy<-4){ ctx.beginPath(); ctx.arc(d*3,4,4,0,Math.PI); ctx.fill(); }
    else if(this.vy>6){ ctx.beginPath(); ctx.arc(d*3,6,3,Math.PI,0); ctx.fill(); }
    else { ctx.fillRect(d<0?-5:1,4,5,2); }
    // legs
    const leg=Math.sin(this._runT*0.28)*7;
    ctx.fillStyle='#2244cc';
    if(this.onGround){
      ctx.fillRect(-10,14,9,8+leg);
      ctx.fillRect(1,14,9,8-leg);
    } else {
      ctx.fillRect(-10,12,9,7); ctx.fillRect(1,12,9,7);
    }
    // outline
    ctx.strokeStyle='#1133aa'; ctx.lineWidth=2; ctx.strokeRect(-11,-17,22,34);
    // wall slide sparkle
    if(this.wallSlide){
      ctx.fillStyle='#ffcc00';
      ctx.beginPath(); ctx.arc(-this.wallDir*13,0,4,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

// ── CAMERA ──
class Camera {
  constructor(){ this.x=0; this.y=0; }
  follow(p){ this.x=lerp(this.x,p.x+p.w/2-W*0.4,0.1); this.y=lerp(this.y,p.y+p.h/2-H*0.45,0.09); }
  snap(p){ this.x=p.x+p.w/2-W*0.4; this.y=p.y+p.h/2-H*0.45; }
}

// ── BACKGROUND ──
function drawBG(cx,cy){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#060320'); g.addColorStop(0.6,'#0d1a50'); g.addColorStop(1,'#1a2565');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // stars
  for(let i=0;i<90;i++){
    const sx=((i*317+80 - cx*0.04)%( W*2)+W*2)%(W*2)-W*0.5;
    const sy=((i*191+60 - cy*0.02)%(H*1.5)+H*1.5)%(H*1.5)-H*0.25;
    if(sx<0||sx>W||sy<0||sy>H) continue;
    const r=i%4===0?1.5:0.7;
    ctx.globalAlpha=(Math.sin(Date.now()*0.001+i*0.7)*0.4+0.6);
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // far mountains
  ctx.fillStyle='#1a1055';
  const mOff=(-cx*0.12)%320;
  for(let i=-1;i<Math.ceil(W/320)+1;i++){
    const bx=i*320+mOff;
    const bh=90+(i%3)*35+60;
    ctx.beginPath(); ctx.moveTo(bx,H); ctx.lineTo(bx+160,H-bh); ctx.lineTo(bx+320,H); ctx.fill();
  }
  // mid clouds
  ctx.fillStyle='rgba(255,255,255,0.07)';
  const cOff=(-cx*0.28)%260;
  for(let i=-1;i<Math.ceil(W/260)+1;i++){
    const bx=i*260+cOff+30;
    const by=60+(i%3)*50;
    ctx.beginPath();
    ctx.arc(bx,by,38,0,Math.PI*2); ctx.arc(bx+50,by-10,28,0,Math.PI*2); ctx.arc(bx-42,by+5,22,0,Math.PI*2);
    ctx.fill();
  }
}

// ── HUD ──
function drawHUD(game){
  // level badge
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.beginPath(); ctx.roundRect(10,10,220,34,6); ctx.fill();
  ctx.fillStyle='#aaccff'; ctx.font='bold 14px sans-serif'; ctx.textAlign='left';
  ctx.fillText(`Lv ${game.level+1}: ${LEVELS[game.level].name}`,18,31);
  // deaths
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.beginPath(); ctx.roundRect(W-130,10,120,34,6); ctx.fill();
  ctx.fillStyle='#ff9988'; ctx.font='bold 14px sans-serif'; ctx.textAlign='right';
  ctx.fillText(`💀 ${game.deaths}`,W-14,31);
  // tip (fades out)
  if(game._tipAlpha>0){
    ctx.globalAlpha=game._tipAlpha;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.roundRect(W/2-240,H-46,480,30,6); ctx.fill();
    ctx.fillStyle='#cce0ff'; ctx.font='12px sans-serif'; ctx.textAlign='center';
    ctx.fillText(LEVELS[game.level].tip,W/2,H-25);
    ctx.globalAlpha=1;
  }
}

// ── SCREENS ──
function drawMenu(){
  const t=Date.now()*0.001;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#040215'); g.addColorStop(1,'#0e1c50');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // stars
  for(let i=0;i<110;i++){
    const sx=(i*313)%W, sy=(i*181)%H;
    ctx.globalAlpha=Math.sin(t+i)*0.4+0.6; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(sx,sy,i%4===0?1.4:0.7,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.textAlign='center';
  // title shadow
  ctx.fillStyle='#001088'; ctx.font='bold 74px sans-serif';
  ctx.fillText('SkySkipper',W/2+3,H/2-90+3);
  // title
  const tg=ctx.createLinearGradient(W/2-230,H/2-150,W/2+230,H/2-90);
  tg.addColorStop(0,'#44aaff'); tg.addColorStop(0.5,'#ffffff'); tg.addColorStop(1,'#aa88ff');
  ctx.fillStyle=tg; ctx.font='bold 74px sans-serif'; ctx.fillText('SkySkipper',W/2,H/2-90);
  ctx.fillStyle='#8899cc'; ctx.font='18px sans-serif'; ctx.fillText('A parkour adventure in the clouds',W/2,H/2-50);
  // demo player bouncing
  const by=Math.sin(t*3)*9;
  ctx.fillStyle='#445566'; ctx.fillRect(W/2-45,H/2+18,90,18);
  ctx.fillStyle='#7a9ab0'; ctx.fillRect(W/2-45,H/2+18,90,4);
  ctx.fillStyle='#3366ff'; ctx.fillRect(W/2-11,H/2-10+by,22,28);
  ctx.fillStyle='#fff'; ctx.fillRect(W/2+2,H/2-4+by,8,7);
  ctx.fillStyle='#111'; ctx.fillRect(W/2+4,H/2-2+by,5,5);
  ctx.strokeStyle='#1133aa'; ctx.lineWidth=2; ctx.strokeRect(W/2-11,H/2-10+by,22,28);
  // play button
  const bp=Math.sin(t*2)*0.1+0.9;
  ctx.fillStyle=`rgba(40,170,90,${0.85*bp})`; ctx.beginPath(); ctx.roundRect(W/2-110,H/2+65,220,52,12); ctx.fill();
  ctx.strokeStyle='#88ffaa'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 22px sans-serif'; ctx.fillText('PRESS SPACE TO PLAY',W/2,H/2+99);
  // controls
  ctx.fillStyle='#5577aa'; ctx.font='13px sans-serif';
  ctx.fillText('Arrow Keys / WASD to move  •  Space / W / ↑ to jump',W/2,H/2+143);
  ctx.fillText('Double jump in mid-air  •  Press into a wall to wall-jump',W/2,H/2+161);
  // block legend
  ctx.fillStyle='#3a4a6a'; ctx.font='11px sans-serif';
  ctx.fillText('Blocks: Normal · Moving · Bouncy · Crumbling · Ice · Spikes · Disappearing · Clouds · Boost Pad',W/2,H-14);
}

function drawDead(deaths){
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ff4444'; ctx.font='bold 54px sans-serif'; ctx.fillText('YOU FELL!',W/2,H/2-35);
  ctx.fillStyle='#ffaa88'; ctx.font='20px sans-serif'; ctx.fillText('Respawning at checkpoint...',W/2,H/2+12);
  ctx.fillStyle='#ff8888'; ctx.font='15px sans-serif'; ctx.fillText(`Deaths: ${deaths}`,W/2,H/2+43);
}

function drawComplete(game){
  ctx.fillStyle='rgba(0,15,0,0.82)'; ctx.fillRect(0,0,W,H);
  const t=Date.now()*0.001;
  const s=1+Math.sin(t*2)*0.03;
  ctx.save(); ctx.translate(W/2,H/2-65); ctx.scale(s,s);
  ctx.fillStyle='#44ff88'; ctx.font='bold 58px sans-serif'; ctx.textAlign='center';
  ctx.fillText('LEVEL CLEAR!',0,0); ctx.restore();
  ctx.fillStyle='#aaffcc'; ctx.font='20px sans-serif'; ctx.textAlign='center';
  ctx.fillText(`${LEVELS[game.level].name}`,W/2,H/2-15);
  ctx.fillStyle='#88ffaa'; ctx.font='15px sans-serif'; ctx.fillText(`Deaths: ${game.deaths}`,W/2,H/2+18);
  const pulse=Math.sin(t*3)*0.2+0.8;
  if(game.level<LEVELS.length-1){
    ctx.fillStyle=`rgba(100,210,255,${pulse})`; ctx.font='bold 21px sans-serif';
    ctx.fillText('Press SPACE for next level',W/2,H/2+65);
  } else {
    ctx.fillStyle='#ffdd44'; ctx.font='bold 26px sans-serif'; ctx.fillText('YOU BEAT THE GAME! 🎉',W/2,H/2+65);
    ctx.fillStyle=`rgba(255,220,80,${pulse})`; ctx.font='18px sans-serif';
    ctx.fillText('Press SPACE to play again',W/2,H/2+100);
  }
}

// ── GAME ──
class Game {
  constructor(){
    this.state='menu'; this.level=0; this.deaths=0;
    this.blocks=[]; this.cps=[]; this.goal=null; this.player=null;
    this.boss=null; this.bossDefeated=false;
    this.cam=new Camera(); this.lastCP=null;
    this._completeT=0; this._tipAlpha=1; this._tipFadeStart=0;
    this._shake=0;
  }

  loadLevel(n){
    this.level=n; this.blocks=[]; this.cps=[]; particles.length=0;
    this.boss=null; this.bossDefeated=false;
    const lv=LEVELS[n];
    for(const bc of lv.blocks) this.blocks.push(new Block(bc));
    for(const cp of lv.checkpoints) this.cps.push(new Checkpoint(cp.x,cp.y));
    // Boss level: goal locked, boss spawned, goal placed at arena exit
    if(lv.bossArena){
      const ba=lv.bossArena;
      this.goal=new Goal(ba.goalX,ba.goalY,true);
      this.boss=new Boss(ba.spawnX,ba.spawnY,ba.arenaL,ba.arenaR,ba.bossHp||5);
    } else {
      this.goal=new Goal(lv.goal.x,lv.goal.y);
    }
    this.player=new Player(lv.spawn.x,lv.spawn.y);
    this.lastCP=null;
    this.cam.snap(this.player);
    this._tipAlpha=1; this._tipFadeStart=300;
  }

  respawn(){
    const lv=LEVELS[this.level];
    const sp=this.lastCP||lv.spawn;
    this.player.reset(sp.x,sp.y);
    this.state='playing';
    // reset crumbled blocks
    for(const b of this.blocks){
      if(b.type==='crumble'&&(b.dead||b._cFall)){
        b.dead=false; b._cFall=false; b._cVY=0; b._ct=0; b._cActive=false; b._cShake=0;
        b.x=b._ox; b.y=b._oy;
      }
    }
    // respawn boss if not yet defeated
    if(this.boss&&!this.bossDefeated){
      const ba=lv.bossArena;
      this.boss=new Boss(ba.spawnX,ba.spawnY,ba.arenaL,ba.arenaR,ba.bossHp||5);
      this.goal.locked=true;
    }
  }

  completeLevel(){
    if(this.state==='levelcomplete') return;
    this.state='levelcomplete'; this._completeT=0; SFX.complete();
  }

  update(){
    if(this.state==='menu'){
      if(Input.anyJust()){ this.loadLevel(0); this.deaths=0; this.state='playing'; }
      return;
    }
    if(this.state==='levelcomplete'){
      this._completeT++;
      if(this._completeT>80&&Input.anyJust()){
        if(this.level<LEVELS.length-1){ this.loadLevel(this.level+1); this.state='playing'; }
        else { this.level=0; this.deaths=0; this.loadLevel(0); this.state='playing'; }
      }
      return;
    }
    // playing or dead
    for(const b of this.blocks) b.update();
    for(const cp of this.cps) cp.update();
    if(this.goal) this.goal.update();
    if(this.boss&&!this.boss.dead) this.boss.update(this.player,this);
    if(this.player){
      this.player.update(this.blocks,this.cps,this.goal,this);
      if(this.player.dead) this.state='dead';
    }
    updateParticles();
    if(this._shake>0) this._shake--;
    if(this.player&&!this.player.dead) this.cam.follow(this.player);
    // tip fade
    if(this._tipFadeStart>0){ this._tipFadeStart--; }
    else if(this._tipAlpha>0){ this._tipAlpha=Math.max(0,this._tipAlpha-0.008); }
  }

  draw(){
    ctx.clearRect(0,0,W,H);
    if(this.state==='menu'){ drawMenu(); return; }
    const {x:cx,y:cy}=this.cam;
    const sx=this._shake>0?rand(-this._shake*0.5,this._shake*0.5):0;
    const sy=this._shake>0?rand(-this._shake*0.3,this._shake*0.3):0;
    if(this._shake>0){ctx.save();ctx.translate(sx,sy);}
    drawBG(cx,cy);
    for(const b of this.blocks) b.draw(cx,cy);
    for(const cp of this.cps) cp.draw(cx,cy);
    if(this.goal) this.goal.draw(cx,cy);
    drawParticles(cx,cy);
    if(this.boss&&!this.boss.dead) this.boss.draw(cx,cy);
    if(this.player) this.player.draw(cx,cy);
    if(this._shake>0) ctx.restore();
    if(this.state!=='menu') drawHUD(this);
    if(this.state==='dead') drawDead(this.deaths);
    if(this.state==='levelcomplete') drawComplete(this);
  }

  run(){
    const loop=()=>{ this.update(); this.draw(); Input.clear(); requestAnimationFrame(loop); };
    requestAnimationFrame(loop);
  }
}

const game=new Game();
game.run();
</script>
